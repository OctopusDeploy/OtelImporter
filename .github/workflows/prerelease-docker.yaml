name: "Build and Push Prerelease Docker Image"

on:
  workflow_dispatch:
    inputs:
      prerelease_suffix:
        description: "Prerelease version suffix (e.g. 'alpha', 'beta'). Defaults to 'prerelease-<timestamp>'."
        required: false
        default: ""

env:
  OCTOVERSION_CurrentBranch: ${{ github.head_ref || github.ref }}

jobs:
  build:
    name: "Build and Test"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      checks: write
    outputs:
      version: ${{ steps.version.outputs.octoversion_fullsemver }}
      majorminorpatch: ${{ steps.version.outputs.octoversion_majorminorpatch }}
      informationalversion: ${{ steps.version.outputs.octoversion_informationalversion }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Append prerelease suffix (user-supplied)
        if: inputs.prerelease_suffix != ''
        run: echo "OCTOVERSION_CurrentBranch=${{ env.OCTOVERSION_CurrentBranch }}-${{ inputs.prerelease_suffix }}" >> $GITHUB_ENV

      - name: Append prerelease suffix (default timestamp)
        if: inputs.prerelease_suffix == ''
        run: echo "OCTOVERSION_CurrentBranch=${{ env.OCTOVERSION_CurrentBranch }}-prerelease-$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: Install OctoVersion
        run: dotnet tool install --global Octopus.OctoVersion.Tool

      - name: Determine version
        id: version
        run: ~/.dotnet/tools/octoversion --DetectEnvironment true

      - name: Restore
        run: dotnet restore OtelImporter.slnx

      - name: Build
        run: dotnet build OtelImporter.slnx --configuration Release --no-restore /p:Version=${{ steps.version.outputs.octoversion_fullsemver }} /p:AssemblyVersion=${{ steps.version.outputs.octoversion_majorminorpatch }} /p:FileVersion=${{ steps.version.outputs.octoversion_majorminorpatch }} /p:InformationalVersion=${{ steps.version.outputs.octoversion_informationalversion }}

      - name: Unit tests
        run: dotnet test tests/OtelImporter.Tests/OtelImporter.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=unit-tests.trx" --results-directory ${{ github.workspace }}/TestResults

      - name: Integration tests
        run: dotnet test tests/OtelImporter.IntegrationTests/OtelImporter.IntegrationTests.csproj --configuration Release --no-build --logger "trx;LogFileName=integration-tests.trx" --results-directory ${{ github.workspace }}/TestResults

      - name: Publish test results
        uses: dorny/test-reporter@6e6a65b7a0bd2c9197df7d0ae36ac5cee784230c # v2.0.0
        if: success() || failure()
        with:
          name: Test Results
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: true

  publish-linux-arm64:
    name: "Publish linux-arm64"
    needs: build
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish AOT binary
        run: dotnet publish src/OtelImporter/OtelImporter.csproj --configuration Release --runtime linux-arm64 /p:Version=${{ needs.build.outputs.version }} /p:AssemblyVersion=${{ needs.build.outputs.majorminorpatch }} /p:FileVersion=${{ needs.build.outputs.majorminorpatch }} /p:InformationalVersion=${{ needs.build.outputs.informationalversion }} --output artifacts/publish

      - name: Package release zip
        run: cd artifacts/publish && zip -r ../../OtelImporter.${{ needs.build.outputs.version }}.linux-arm64.zip . -x '*.dbg' '*.pdb'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OtelImporter-linux-arm64
          path: OtelImporter.${{ needs.build.outputs.version }}.linux-arm64.zip
          if-no-files-found: error

  docker:
    name: "Build and Push Prerelease Docker Image"
    needs: [build, publish-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compute image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: OtelImporter-linux-arm64
          path: artifact/

      - name: Extract binary
        run: unzip artifact/*.zip OtelImporter -d .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.build.outputs.version }}
          provenance: false
