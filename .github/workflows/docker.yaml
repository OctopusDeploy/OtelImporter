name: "Build and Push Docker Image"

on:
  release:
    types: [published]

jobs:
  docker:
    name: "Build and Push Docker image"
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to check out code and download release assets
      packages: write # Required to push the image to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      # GHCR requires a lowercase repository path (OctopusDeploy/OtelImporter -> octopusdeploy/otelimporter).
      - name: Compute image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Download linux-x64 release asset
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "*linux-x64*.zip" \
            --dir release-assets/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract linux-x64 binary
        run: |
          unzip release-assets/*.zip -d release-assets/extracted
          chmod +x release-assets/extracted/OtelImporter
          cp release-assets/extracted/OtelImporter ./OtelImporter

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
          provenance: false
